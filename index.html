<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methoden-Bibliothek</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--paper:#ffffff;--ink:#111111;--ink-light:#666666;--accent:#F07800;--shadow:rgba(0,0,0,.10);--blau:#5b8dd9;--gruen:#5aaa6a;--orange:#e8954a;--lila:#9b6ecf;--rot:#d95f5f;--tuerkis:#3db8ac}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Nunito,sans-serif;background:#f7f7f5;color:var(--ink);min-height:100vh}
header{position:relative;z-index:1;padding:2.5rem 2rem .5rem;max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:flex-start;gap:1rem;justify-content:space-between}
.logo h1{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:900;line-height:1;letter-spacing:0.07em;text-transform:uppercase;color:#111111}
.logo p{font-family:'Gaegu',cursive;font-size:1.15rem;color:var(--accent);margin-top:.1rem;font-weight:700;letter-spacing:-0.01em}
.donate{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem}
.donate a{display:inline-flex;align-items:center;gap:.45rem;background:var(--accent);color:#ffffff;border:none;border-radius:12px;padding:.6rem 1.2rem;font-family:Nunito,sans-serif;font-weight:800;font-size:.92rem;cursor:pointer;text-decoration:none;box-shadow:3px 3px 0 rgba(0,0,0,.14);transition:transform .15s,box-shadow .15s;white-space:nowrap}
.donate a:hover{transform:translateY(-2px);box-shadow:4px 5px 0 rgba(0,0,0,.18)}
.donate span{font-size:.7rem;color:var(--ink-light);text-align:right;font-weight:600}
.bar{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:.8rem 2rem 0;display:flex;align-items:center;gap:1rem}
.badge{background:var(--accent);color:#fff;border-radius:100px;padding:.32rem .9rem;font-size:.8rem;font-weight:800}
.filters{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:.8rem 2rem 1.2rem;display:flex;flex-wrap:wrap;gap:.5rem}
.fb{border:2px solid rgba(26,31,46,.12);border-radius:100px;padding:.38rem 1rem;font-family:Nunito,sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .15s;background:var(--paper);color:var(--ink);box-shadow:2px 2px 0 var(--shadow)}
.fb:hover{transform:translateY(-1px);box-shadow:3px 4px 0 var(--shadow)}
.fb.active{color:#fff;border-color:transparent}
.fb[data-c=alle].active{background:var(--accent)}
.fb[data-c=blau].active{background:var(--blau)}
.fb[data-c=gruen].active{background:var(--gruen)}
.fb[data-c=orange].active{background:var(--orange)}
.fb[data-c=lila].active{background:var(--lila)}
.fb[data-c=rot].active{background:var(--rot)}
.fb[data-c=tuerkis].active{background:var(--tuerkis)}
.grid{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.3rem}
.card{background:var(--paper);border-radius:14px;overflow:hidden;box-shadow:3px 4px 0 var(--shadow);cursor:pointer;transition:transform .18s,box-shadow .18s;border:1.5px solid rgba(0,0,0,.07);animation:fi .3s ease both}
.card:hover{transform:translateY(-4px) rotate(.3deg);box-shadow:6px 9px 0 var(--shadow)}
.card.hidden{display:none}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.stripe{height:7px}
.card[data-c=blau] .stripe{background:var(--blau)}
.card[data-c=gruen] .stripe{background:var(--gruen)}
.card[data-c=orange] .stripe{background:var(--orange)}
.card[data-c=lila] .stripe{background:var(--lila)}
.card[data-c=rot] .stripe{background:var(--rot)}
.card[data-c=tuerkis] .stripe{background:var(--tuerkis)}
.thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#e8edf2}
.icon-fallback{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#e8edf2}
.cbody{padding:.85rem 1rem 1rem}
.cmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.ccat{font-size:.67rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.cdauer{font-size:.67rem;font-weight:700;color:var(--ink-light);white-space:nowrap}
.card[data-c=blau] .ccat{color:var(--blau)}
.card[data-c=gruen] .ccat{color:var(--gruen)}
.card[data-c=orange] .ccat{color:var(--orange)}
.card[data-c=lila] .ccat{color:var(--lila)}
.card[data-c=rot] .ccat{color:var(--rot)}
.card[data-c=tuerkis] .ccat{color:var(--tuerkis)}
.ctitle{font-family:'Gaegu',cursive;font-size:1.22rem;font-weight:700;line-height:1.15;letter-spacing:-0.07em}
.csub{font-size:.75rem;color:var(--ink-light);margin-top:.2rem;line-height:1.4}
.edots{display:flex;gap:3px;margin-top:.5rem}
.ed{width:8px;height:8px;border-radius:50%;background:#d0c9be}
.ed.on{background:var(--dc,#999)}
.overlay{position:fixed;inset:0;background:rgba(26,31,46,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--paper);border-radius:18px;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:8px 12px 0 rgba(26,31,46,.15);border:2px solid rgba(26,31,46,.08);transform:scale(.95) translateY(10px);transition:transform .22s}
.overlay.open .modal{transform:scale(1) translateY(0)}
.mstripe{height:8px;border-radius:16px 16px 0 0}
.mstripe.blau{background:var(--blau)}.mstripe.gruen{background:var(--gruen)}.mstripe.orange{background:var(--orange)}.mstripe.lila{background:var(--lila)}.mstripe.rot{background:var(--rot)}.mstripe.tuerkis{background:var(--tuerkis)}
.mhead{padding:1.4rem 1.5rem .5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.mcat{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
.mtitle{font-family:'Gaegu',cursive;font-size:2rem;font-weight:700;line-height:1.1;letter-spacing:-0.07em}
.msub{font-size:.88rem;color:var(--ink-light);margin-top:.3rem}
.mclose{width:32px;height:32px;border-radius:50%;border:2px solid rgba(26,31,46,.12);background:var(--paper);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--ink);flex-shrink:0;margin-top:2px}
.mclose:hover{background:var(--accent);color:#fff}
.mbody{padding:0 1.5rem 2rem;display:grid;gap:1rem}
.mimg{width:100%;border-radius:10px;border:1.5px solid rgba(42,37,32,.08);display:block}
.mimg.hidden{display:none}
.toggle-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .9rem;border-radius:100px;background:var(--ink);color:var(--paper);font-size:.78rem;font-weight:700;border:none;cursor:pointer;opacity:.9}
.toggle-btn:hover{opacity:1}
.mstats{display:flex;gap:1.5rem;flex-wrap:wrap;padding:.8rem 1.1rem;background:rgba(26,31,46,.04);border-radius:10px}
.sl{font-size:.66rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-light)}
.sv{font-size:.86rem;font-weight:700}
.msec{background:rgba(26,31,46,.04);border-radius:10px;padding:1rem 1.1rem}
.msec h3{font-size:.68rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-light);margin-bottom:.6rem}
.slist{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.slist li{display:grid;grid-template-columns:2rem 1fr;gap:.5rem;align-items:baseline}
.snum{width:1.5rem;height:1.5rem;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:800;color:#fff;flex-shrink:0}
.stxt{font-size:.87rem;line-height:1.5}
.sqt{font-style:italic;color:var(--ink-light);font-size:.81rem;margin-top:.15rem}
.tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{padding:.25rem .7rem;border-radius:100px;font-size:.76rem;font-weight:700;background:rgba(42,37,32,.07);color:var(--ink)}
.tag.pos{background:rgba(90,170,106,.15);color:#347a42}
.tag.neg{background:rgba(217,95,95,.15);color:#a83535}
.fixes{display:flex;flex-direction:column;gap:.6rem}
.fix{font-size:.85rem;line-height:1.55}
.fix b{font-weight:800}
@media(max-width:600px){header,.filters,.bar,.grid{padding-left:1rem;padding-right:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <h1>Methoden-Bibliothek</h1>
    <p>Coaching-Tools auf einen Blick</p>
  </div>
  <div class="donate">
    <a href="https://buymeacoffee.com/DEIN-USERNAME" target="_blank" rel="noopener">&#9749; Buy me a coffee</a>
    <span>Mit Liebe gemacht, mit Freude geteilt.</span>
  </div>
</header>
<div class="bar"><span class="badge" id="badge">-- Karten</span></div>
<div class="filters" id="filters"><button class="fb active" data-c="alle">Alle</button></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mstripe" id="ms"></div>
    <div class="mhead">
      <div><div class="mcat" id="mc"></div><div class="mtitle" id="mt"></div><div class="msub" id="mu"></div></div>
      <button class="mclose" id="mx">&#10005;</button>
    </div>
    <div class="mbody" id="mb"></div>
  </div>
</div>
<script>
var K=[
{id:'skalierung',t:'Skalierung',u:'Veraenderung messbar machen und durch kleine Schritte konkret gestalten',kat:'Erdenken',f:'blau',icon:'X',b:'Methodenkarten/Skalierung.jpg',b2:'',d:'10 Min',e:2,aus:['klar, konkret','wertschätzend','realistisch'],
steps:[['Skala definieren','Auf einer Skala von 1 bis 10: 1 = Problem maximal, 10 = Ziel erreicht ...'],['Standort-Bestimmung','Wo stehen Sie aktuell?'],['Erfolge bewusst machen (optional)','Sie sagen X und nicht X-1. Was haben Sie bereits erreicht?'],['Konkrete Veränderung planen','Was würde Sie von X auf X+1 bringen?']],
ja:['Abstraktes Ziel konkret messbar machen','Fortschritt sichtbar machen (Motivation)','Überforderung reduzieren (kleine Schritte)'],
nein:['Thema zu komplex für lineare Skala'],
trigger:['Ich weiß nicht, wo ich anfangen soll ...','Ich habe das Gefühl, ich komme nicht voran.','Das Ziel ist so weit weg ...'],
fixes:[['Klient:in schwankt zwischen Zahlen','Nehmen Sie was sich heute richtig anfühlt!'],['Klient:in will unrealistisch große Schritte','Check über zirkuläre Frage']]},

{id:'wunderfrage',t:'Wunderfrage',u:'Die Zukunft ohne Restriktionen erleben und konkrete Ziele entdecken',kat:'Erdenken',f:'blau',icon:'X',b:'Methodenkarten/Wunderfrage.jpg',b2:'Methodenkarten/Wunderfrage - Text.jpg',d:'15 Min',e:3,aus:['neugierig','ruhig und flüssig','Zeit geben'],
steps:[['Imaginations-Set-Up','Ich möchte Sie zu einem Gedankenexperiment einladen ...'],['Die Wunderfrage','Stellen Sie sich vor, heute Nacht geschieht ein Wunder. Ihr Problem ist gelöst. Woran würden Sie morgen als Erstes merken, dass das Wunder geschehen ist?'],['Konkretisierung','Was genau würden Sie anders machen? / Wer würde es noch bemerken? / Was wäre der erste kleine Unterschied?'],['Rückführung','Von all dem, was Sie beschrieben haben - was davon passiert bereits manchmal? Auch wenn nur zu 5%?']],
ja:['Klient:in ist problemfokussiert, sieht keine Lösung','Klient:in wünscht Veränderung, hat aber keine Vision','Wenn größer, verrückter Denken hilfreich ist'],
nein:['Akute Krise / starke Emotionen (erst stabilisieren)','Sehr rationale / skeptische Typen (vorher Akzeptanz klären)'],
trigger:['Ich weiß gar nicht mehr weiter ...','Alles ist festgefahren.','Ich kann mir nicht vorstellen, wie es anders sein könnte.'],
fixes:[['Klient:in: Das ist unrealistisch','Das darf es sein. Was wäre trotzdem anders?'],['Klient:in findet keinen Zugang','Lassen wir das Wunder weg. Was würde sich ändern, wenn das Problem gelöst wäre?']]},

{id:'aktienkurs',t:'Aktienkurs',u:'Lebens- und Entwicklungszusammenhaenge visualisieren, um Prognosen und Entscheidungen zu treffen',kat:'Erdenken',f:'blau',icon:'X',b:'Methodenkarten/Aktienkurs.jpg',b2:'',d:'25 Min',e:2,aus:['analytisch, strukturiert','Zeit für Betrachtung'],
steps:[['Set-Up und Achsen','Ich lade Sie ein, Ihre Lebensentwicklung wie einen Aktienkurs zu zeichnen. x = Zeit, y = Ausprägung'],['Themen finden','Welche Lebensaspekte wollen Sie betrachten? max. 3-4: Karriere, Gesundheit, Beziehung, Zufriedenheit, Finanzen'],['Linien zeichnen','Entwicklung jeder Linie von Startpunkt bis heute - Wendepunkte und Schlüsselmomente notieren'],['Analyse und Prognose','Schauen Sie auf das Gesamtbild. Was fällt Ihnen auf? Parallel / gegenläufig / Zusammenhänge / Überraschendes']],
ja:['Klient:in will Zusammenhänge zwischen Lebensbereichen verstehen','Retrospektive: Wie kam es dazu, dass ...?'],
nein:['Akute Krise (zu analytisch, zu wenig emotional)'],
trigger:['Ich verstehe nicht, wie das zusammenhängt ...','Warum läuft gerade alles schief / gut?'],
fixes:[['Klient:in weiß nicht mehr, wie es damals war','Schätzen Sie grob. Es geht um den Trend, nicht um Exaktheit.'],['Alle Linien identisch (parallel)','Interessant. Was bedeutet das für Sie? Hängt alles zusammen?']]},

{id:'vision',t:'Vision Pensionierung',u:'Kurze Gedankenreise, um grundsaetzliche Interessen, Beduerfnisse, Wuensche und Werte zu identifizieren',kat:'Erfühlen',f:'lila',icon:'X',b:'Methodenkarten/Vision Pensionierung.jpg',b2:'Methodenkarten/Vision Pensionierung - Text.jpg',d:'10 Min',e:1,aus:['neugierige Haltung','ruhig und langsam','Zeit geben'],
steps:[['Zeitreise-Set-Up','Ich lade Sie zu einer besonderen Zeitreise ein. Wir springen an das Ende Ihres Berufslebens ...'],['Rückblick-Frage','Stellen Sie sich vor, Sie feiern den Tag Ihrer Pensionierung. Sie sind zufrieden und glücklich. Sie blicken auf Ihr Berufsleben zurück.'],['Konkretisierung','Was haben Sie erlebt? Was haben Sie erreicht? Welche Stationen haben Sie durchlaufen?'],['Rückführung','Machen Sie im Geiste kleine Schnappschüsse ... Kommen Sie jetzt langsam zurück.']],
ja:['Klient:in sucht langfristige berufliche Orientierung','Entscheidungssituationen: Job-Wechsel, Karriereweg','Gefühl von Hamsterrad - braucht Sinn-Perspektive'],
nein:['Akute Konflikte (zu weit weg vom Problem)'],
trigger:['Ich weiß nicht, ob das alles Sinn macht ...','Ich möchte nicht irgendwann bereuen, dass ich ...','Was will ich eigentlich wirklich erreichen?'],
fixes:[['Klient:in: Ich kann mir das nicht vorstellen','Wenn ein guter Freund bei Ihrer Pensionsfeier eine Rede hält - was würde er über Sie sagen?'],['Klient:in wird emotional (gerührt)','Pause geben. Was berührt Sie gerade?']]},

{id:'maerchen',t:'Märchentool',u:'Probleme in Fiktion verpacken, um mit Abstand kreative Loesungen zu entdecken',kat:'Erfühlen',f:'lila',icon:'X',b:'Methodenkarten/Märchentool.jpg',b2:'',d:'25 Min',e:1,aus:['spielerisch','im Märchen bleiben','Klient:in Lösung finden lassen'],
steps:[['Format finden','In welchem Genre möchten Sie Ihre Geschichte erzählen? Vielleicht ein Märchen, Film/Serie ...'],['Titel finden','Wenn Ihr Thema ein Format wäre, wie lautete der Titel? Seien Sie gerne ganz kreativ.'],['Format erzählen lassen','Erzählen Sie mir Ihr Thema als Format. Beginnen Sie mit Es war einmal ... Machen Sie 5 Schritte bis zur aktuellen Situation.'],['Happy End','Welche 3 Schritte könnten Sie jetzt machen, damit in Ihrem Format das Happy End kommt? Alles ist möglich, alles ist erlaubt ...'],['Transfer','Ausgehend vom Happy End: Zu welchen Ideen inspiriert es Sie jetzt für Ihre Wirklichkeit?']],
ja:['Klient:in ist problemfokussiert, sieht keine Lösung','Klient:in braucht Abstand zum Problem','Festgefahrene rational-analytische Typen'],
nein:['Akute Trauma-Themen','Klient:in findet keinen Zugang zu Kreativität'],
trigger:['Ich drehe mich im Kreis ...','Ich sehe keinen Ausweg ...','Alles fühlt sich festgefahren an.'],
fixes:[['Klient:in zu nah an Realität','Bleiben Sie in der Geschichte. Wie heißt die Person im Märchen?'],['Klient:in zu schnell im Happy End','Erzählen Sie erst das ganze Märchen bis zur Krise. In 5 Schritten.']]},

{id:'analog',t:'Analoges Arbeiten',u:'Durch Metaphern und Bilder emotionalen Abstand gewinnen und kreative Lösungen entdecken',kat:'Erfühlen',f:'lila',icon:'X',b:'Methodenkarten/analoges Arbeiten.jpg',b2:'Methodenkarten/analoges Arbeiten Metaphern.jpg',d:'25 Min',e:1,aus:['spielerisch','neugierig','im Bild halten'],
steps:[['Metapher wählen','Wenn Ihr Thema / Ihre Situation etwas anderes wäre, was wäre es dann? Alternativ: Planet, Haus, Schiff, Auto ...'],['Ist-Zustand im Bild','Beschreiben Sie die Situation in / auf dem Bild.'],['Veränderung im Bild','Was müsste sich im Bild ändern, damit es gut wird? Alles ist möglich.'],['Transfer','Inspiriert durch dieses Bild: Welche Lösungen fallen Ihnen ein?']],
ja:['Klient:in braucht emotionalen Abstand zum Problem','Festgefahrene Situation','Rationaler Zugang führt nicht weiter'],
nein:['Akute Krise (zu distanzierend)','Sehr konkrete, faktische Problemstellungen'],
trigger:['Ich drehe mich im Kreis ...','Ich sehe keinen Ausweg ...','Alles fühlt sich festgefahren an.'],
fixes:[['Klient:in zu nah an Realität','Im Bild bleiben, ggf. VAKOG'],['Lösung entsteht nicht','Was wäre, wenn ein Zauberer käme und alles gut macht - wie sähe es dann aus?']]},

{id:'hypno',t:'Hypnotrance',u:'Durch Entspannung und innere Bilder Zugang zum Unbewussten und zu Ressourcen schaffen',kat:'Erfühlen',f:'lila',icon:'X',b:'Methodenkarten/Hypnotrance.jpg',b2:'',d:'20 Min',e:1,aus:['ruhig, sanft','SEHR langsam','haltgebend'],
steps:[['Rahmen und Sicherheit schaffen','Kontrakt: Sie können jederzeit die Augen öffnen und aussteigen.'],['In Entspannung führen','Schließen Sie die Augen ... Spüren Sie Ihren Atem ... Ein ... und aus ... Mitatmen verlangsamen, optional: Body Scan'],['Innere Reise','Ressourcenreise / Zukunftsvision / Sicherer Ort'],['Rückführung','Nehmen Sie die Bilder, Gefühle, Eindrücke mit ... Speichern Sie alles ab ... optional: Anker']],
ja:['Zugang zu unbewussten Ressourcen / Lösungen nötig','Vision entwickeln (Zukunft erleben)','Entspannung / Stabilisierung bei Stress','Vorbereitung auf Herausforderung'],
nein:['Dissoziation in Vorgeschichte','Psychotische Erkrankung','Akute Panik (erst stabilisieren)'],
trigger:['Ich weiß rational, was ich tun sollte, aber ...','Ich bin total gestresst und komme nicht runter.','Ich kann mir nicht vorstellen, wie es sein könnte.'],
fixes:[['Klient:in schläft ein','Nach 1-2 Min sanft wecken. Oeffnen Sie langsam die Augen ...'],['Klient:in wird emotional','Sie dürfen fühlen. Atmen Sie weiter. Ggf. abbrechen / stabilisieren.']]},

{id:'sicherort',t:'Sicherer Ort',u:'Inneren Rueckzugsort schaffen fuer Sicherheit, Entspannung und Ressourcen-Zugang',kat:'Stärken',f:'tuerkis',icon:'X',b:'Methodenkarten/sicherer Ort.jpg',b2:'Methodenkarten/Sicherer Ort - Text.jpg',d:'15 Min',e:1,aus:['sehr langsam sprechen','Pausen (aus)halten'],
steps:[['Rahmen schaffen, einstimmen','Machen Sie es sich bequem, schließen Sie die Augen ... Position finden'],['In Entspannung führen','Atemfokus + Body-Scan sehr langsam'],['Inneres Bild zeichnen','Stellen Sie sich einen Ort vor, an dem Sie sich vollkommen sicher und wohl fühlen ...'],['Ankern und Rückführung','Ankern: kinestetisch / verbal / mental. Nehmen Sie dieses Gefühl mit ... öffnen Sie langsam die Augen ...']],
ja:['Emotionale Regulierung, z.B. bei Stress, Angst','Vor schwierigen Situationen','Allg. Ressourcenaufbau, Stabilisierung'],
nein:['Psychotische Erkrankung, Dissoziation'],
trigger:['Ich komme gar nicht mehr zur Ruhe ...','Ich fühle mich nirgends sicher.','Ich brauche einen Rückzugsort.'],
fixes:[['Klient:in findet keinen Ort','Das ist okay. Stellen Sie sich einfach eine Farbe / ein Gefühl vor.'],['Klient:in wird emotional (weint)','Raum geben. Sie dürfen fühlen. Ich bin hier. Ggf. abbrechen und stabilisieren.']]},

{id:'ressourcen',t:'Ressourcen-Coaching',u:'Vorhandene Staerken, Faehigkeiten und positive Erfahrungen re-aktivieren',kat:'Stärken',f:'tuerkis',icon:'X',b:'Methodenkarten/Ressourcen-Coaching.jpg',b2:'',d:'20 Min',e:2,aus:['wertschätzend','konkret'],
steps:[['Ressource identifizieren','Welche Eigenschaft oder Fähigkeit oder Stärke bräuchten Sie aus sich selbst heraus, damit Sie dieses Ziel erreichen können?'],['Historie','Wann in Ihrer Vergangenheit hatten Sie schon einmal diese Eigenschaft / Fähigkeit? Stärkste Situation rauspicken, ganz ins Gefühl gehen.'],['Rahmenbedingungen explorieren','Was waren damals die Bedingungen, dass das Ziel gelungen ist?'],['Transfer','Zielfrage wiederholen. Was sind Experimente für die Fragestellung? Sammeln, Vertrag / SMARTEN']],
ja:['Klient:in weiß wohin, aber irgendwas blockiert','Bei Selbstzweifeln, vor Herausforderungen','Problemfokus überwinden'],
nein:['Wenn konkrete Fähigkeiten wirklich fehlen (dann Kompetenzaufbau)'],
trigger:['Ich kann das nicht ...','Ich habe nichts, was mir hilft.','Früher konnte ich das, aber jetzt ...'],

var CV={blau:'#5b8dd9',gruen:'#5aaa6a',orange:'#e8954a',lila:'#9b6ecf',rot:'#d95f5f',tuerkis:'#3db8ac'};

function buildFilters(){
  var bar=document.getElementById('filters'),seen={};
  K.forEach(function(k){
    if(!seen[k.f]){
      seen[k.f]=true;
      var cats=K.filter(function(x){return x.f===k.f}).map(function(x){return x.kat});
      cats=[...new Set(cats)];
      var btn=document.createElement('button');
      btn.className='fb';btn.dataset.c=k.f;
      btn.textContent=cats.join(' / ');
      btn.addEventListener('click',function(){filterBy(k.f,btn)});
      bar.appendChild(btn);
    }
  });
}

function filterBy(cat,btn){
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var n=0;
  document.querySelectorAll('.card').forEach(function(el){
    var show=cat==='alle'||el.dataset.c===cat;
    el.classList.toggle('hidden',!show);
    if(show)n++;
  });
  document.getElementById('badge').textContent=n+' Karte'+(n!==1?'n':'');
}

function buildGrid(){
  var grid=document.getElementById('grid');
  K.forEach(function(k,i){
    var el=document.createElement('div');
    el.className='card';el.dataset.c=k.f;
    el.style.animationDelay=(i*0.04)+'s';
    var col=CV[k.f];
    var dots=[1,2,3].map(function(n){return '<div class="ed'+(n<=k.e?' on':'')+'"'+(n<=k.e?' style="--dc:'+col+'"':'')+'>&#8203;</div>'}).join('');
    var img=k.b?'<img class="thumb" src="'+k.b+'" alt="'+k.t+'" loading="lazy">':'<div class="icon-fallback">&#128218;</div>';
    el.innerHTML='<div class="stripe"></div>'+img+'<div class="cbody"><div class="cmeta"><span class="ccat">'+k.kat+'</span><span class="cdauer">&#9201; '+k.d+'</span></div><div class="ctitle">'+k.t+'</div><div class="csub">'+k.u+'</div><div class="edots">'+dots+'</div></div>';
    el.addEventListener('click',function(){openModal(k)});
    grid.appendChild(el);
  });
  document.getElementById('badge').textContent=K.length+' Karten';
}

function openModal(k){
  var col=CV[k.f];
  document.getElementById('ms').className='mstripe '+k.f;
  document.getElementById('mc').textContent=k.kat;
  document.getElementById('mc').style.color=col;
  document.getElementById('mt').textContent=k.t;
  document.getElementById('mu').textContent=k.u;
  var dots=[1,2,3].map(function(n){return '<div class="ed'+(n<=k.e?' on':'')+'"'+(n<=k.e?' style="--dc:'+col+'"':'')+'>&#8203;</div>'}).join('');
  var imgHtml='';
  if(k.b){imgHtml+='<img class="mimg" id="mimg1" src="'+k.b+'" alt="'+k.t+'">';}
  if(k.b2){imgHtml+='<img class="mimg hidden" id="mimg2" src="'+k.b2+'" alt="'+k.t+' Text"><button class="toggle-btn" id="tbtn">&#128196; Textversion anzeigen</button>';}
  var steps=k.steps.map(function(s,i){return '<li><span class="snum" style="background:'+col+'">'+(i+1)+'</span><div><div class="stxt"><b>'+s[0]+'</b></div>'+(s[1]?'<div class="sqt">'+s[1]+'</div>':'')+'</div></li>'}).join('');
  var ja=k.ja.map(function(t){return '<span class="tag pos">&#10003; '+t+'</span>'}).join('');
  var nein=k.nein.map(function(t){return '<span class="tag neg">&#10007; '+t+'</span>'}).join('');
  var trig=k.trigger.map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
  var fixes=k.fixes.map(function(f){return '<div class="fix"><b>Situation:</b> '+f[0]+'<br><b>Fix:</b> '+f[1]+'</div>'}).join('');
  document.getElementById('mb').innerHTML=imgHtml+'<div class="mstats"><div><div class="sl">Dauer</div><div class="sv">&#9201; '+k.d+'</div></div><div><div class="sl">Energie</div><div class="sv" style="display:flex;gap:4px;margin-top:3px">'+dots+'</div></div><div><div class="sl">Ausführung</div><div class="sv">'+k.aus.join(' &middot; ')+'</div></div></div><div class="msec"><h3>Kernablauf</h3><ul class="slist">'+steps+'</ul></div><div class="msec"><h3>Wann nutze ich das?</h3><div class="tags">'+ja+nein+'</div></div>'+(k.trigger.length?'<div class="msec"><h3>Typische Aussagen</h3><div class="tags">'+trig+'</div></div>':'')+(k.fixes.length?'<div class="msec"><h3>Was tue ich, wenn ...?</h3><div class="fixes">'+fixes+'</div></div>':'');
  var tb=document.getElementById('tbtn');
  if(tb){var show=false;tb.addEventListener('click',function(){show=!show;document.getElementById('mimg2').classList.toggle('hidden',!show);tb.innerHTML=show?'&#128444; Hauptkarte anzeigen':'&#128196; Textversion anzeigen';});}
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
document.getElementById('mx').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.querySelector('.fb[data-c="alle"]').addEventListener('click',function(){filterBy('alle',this);});
buildFilters();buildGrid();
</script>
